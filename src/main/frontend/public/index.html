<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flowable 流程管理系统 - 请假申请</title>
    <!-- Element Plus CSS -->
    <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css">
    <link rel="stylesheet" href="https://unpkg.com/element-plus/theme-chalk/dark/css-vars.css">
    <!-- Vue Datepicker CSS -->
    <link rel="stylesheet" href="https://unpkg.com/vue-datepicker-next/dist/style.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #f5f7fa;
            color: #303133;
            line-height: 1.6;
        }

        #app {
            min-height: 100vh;
        }

        .page-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            background: linear-gradient(135deg, #409eff 0%, #67c23a 100%);
            color: white;
            padding: 30px 20px;
            border-radius: 8px;
            margin-bottom: 30px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.1);
        }

        .header h1 {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 16px;
            opacity: 0.9;
        }

        .content-wrapper {
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 30px;
        }

        @media (max-width: 768px) {
            .content-wrapper {
                grid-template-columns: 1fr;
            }
        }

        .main-content {
            background: white;
            border-radius: 8px;
            padding: 30px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.1);
        }

        .sidebar {
            background: white;
            border-radius: 8px;
            padding: 25px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.1);
        }

        .section-title {
            font-size: 20px;
            font-weight: 600;
            color: #409eff;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #f0f2f5;
        }

        .form-item {
            margin-bottom: 22px;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #606266;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 25px;
        }

        .stat-card {
            background: #f5f7fa;
            border-radius: 6px;
            padding: 15px;
            text-align: center;
            transition: all 0.3s;
        }

        .stat-card:hover {
            background: #e4e7ed;
            transform: translateY(-2px);
        }

        .stat-number {
            font-size: 24px;
            font-weight: 600;
            color: #409eff;
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 14px;
            color: #909399;
        }

        .process-list {
            margin-top: 20px;
        }

        .process-item {
            background: #f5f7fa;
            border-radius: 6px;
            padding: 15px;
            margin-bottom: 15px;
            border-left: 4px solid #409eff;
            transition: all 0.3s;
        }

        .process-item:hover {
            background: #e4e7ed;
            transform: translateX(5px);
        }

        .process-status {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
            margin-bottom: 8px;
        }

        .status-draft {
            background: #f0f2f5;
            color: #909399;
        }

        .status-pending {
            background: #fff2e8;
            color: #ed6c00;
        }

        .status-approved {
            background: #e8f5e9;
            color: #67c23a;
        }

        .status-rejected {
            background: #fee;
            color: #f56c6c;
        }

        .process-info h4 {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .process-info p {
            font-size: 14px;
            color: #606266;
            margin-bottom: 3px;
        }

        .action-buttons {
            margin-top: 20px;
            display: flex;
            gap: 12px;
            justify-content: flex-end;
        }

        .loading {
            text-align: center;
            padding: 50px;
            color: #909399;
        }

        .error-message {
            background: #fee;
            color: #f56c6c;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
            border-left: 4px solid #f56c6c;
        }

        .success-message {
            background: #e8f5e9;
            color: #67c23a;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
            border-left: 4px solid #67c23a;
        }

        .tips {
            background: #f0f9ff;
            border-radius: 6px;
            padding: 15px;
            margin-top: 30px;
            border-left: 4px solid #409eff;
        }

        .tips h4 {
            color: #409eff;
            margin-bottom: 10px;
        }

        .tips ul {
            padding-left: 20px;
        }

        .tips li {
            margin-bottom: 8px;
            color: #606266;
        }

        .footer {
            text-align: center;
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid #e4e7ed;
            color: #909399;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div id="app"></div>

    <!-- Element Plus JS -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <script src="https://unpkg.com/element-plus/dist/index.full.min.js"></script>
    <script src="https://unpkg.com/@element-plus/icons-vue/dist/index.iife.js"></script>
    <script src="https://unpkg.com/vue-datepicker-next"></script>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    <script src="https://unpkg.com/dayjs/dayjs.min.js"></script>

    <!-- Our Vue App -->
    <script src="./src/main.js"></script>
</body>
</html>
